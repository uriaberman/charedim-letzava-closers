<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>חרדים לצבא · סגיר רילס אינסטגרם — 5 כיוונים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --olive:#808050; --gold:#c9a44d; --panel:#26240f; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Rubik",system-ui,Arial,sans-serif;background:#16150d;color:#f2f1e6;
    background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.018) 0 2px, transparent 2px 12px);
    min-height:100vh;padding-bottom:50px}
  header{padding:42px 28px 26px;text-align:center;border-bottom:1px solid rgba(201,164,77,.22);
    background:linear-gradient(180deg,#1c1b0f,#16150d)}
  header .kicker{color:var(--gold);font-weight:600;letter-spacing:3px;font-size:13px;margin-bottom:12px}
  header h1{font-size:34px;font-weight:700;margin-bottom:6px}
  header h1 b{color:var(--olive)}
  header h2{font-size:17px;font-weight:500;color:#cfcdb9}
  .toolbar{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
  .btn{background:var(--gold);color:#1a160a;border:none;border-radius:999px;padding:10px 20px;
    font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:transform .15s,filter .15s}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.07)}

  .grid{display:grid;gap:24px;padding:32px 28px 0;
    grid-template-columns:repeat(auto-fit,minmax(290px,1fr));max-width:1700px;margin:0 auto}
  .card{background:var(--panel);border:1px solid rgba(201,164,77,.16);border-radius:20px;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 18px 50px rgba(0,0,0,.4)}
  .vidwrap{position:relative;width:100%;aspect-ratio:9/16;background:#000}
  .vidwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
  .num{position:absolute;top:14px;right:14px;z-index:3;width:44px;height:44px;border-radius:50%;
    background:rgba(0,0,0,.6);color:var(--gold);display:grid;place-items:center;font-weight:700;font-size:21px;
    border:1.5px solid rgba(201,164,77,.55)}
  .cardbtns{display:flex;gap:8px;padding:14px}
  .cardbtns button, .cardbtns a{flex:1;text-align:center;text-decoration:none;background:rgba(255,255,255,.06);
    color:#f2f1e6;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 6px;
    font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap}
  .cardbtns button:hover, .cardbtns a:hover{background:rgba(201,164,77,.16)}
  .cardbtns a.dl{background:var(--gold);color:#1a160a;border-color:var(--gold);font-weight:600;flex:1.3}
  .cardbtns a.dl:hover{filter:brightness(1.08);background:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="kicker">חרדים לצבא · פודקאסט · סגיר רילס אינסטגרם 9:16</div>
  <h1>חרדים <b>לצבא</b></h1>
  <h2>5 כיווני סגיר לבחירה</h2>
  <div class="toolbar">
    <button class="btn" onclick="reloadAll()">▶ נגן הכל מחדש</button>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>
  const closers = [
    {n:1, file:"closer-1-merge.html",     mp4:"closer-1.mp4"},
    {n:2, file:"closer-2-stamp.html",     mp4:"closer-2.mp4"},
    {n:3, file:"closer-3-cinematic.html", mp4:"closer-3.mp4"},
    {n:4, file:"closer-4-draw.html",      mp4:"closer-4.mp4"},
    {n:5, file:"closer-5-minimal.html",   mp4:"closer-5.mp4"},
  ];

  const grid = document.getElementById("grid");
  closers.forEach((c,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="vidwrap">
        <div class="num">${c.n}</div>
        <iframe id="if${i}" src="${c.file}" loading="eager" title="סגיר ${c.n}"></iframe>
      </div>
      <div class="cardbtns">
        <button onclick="reloadOne(${i})">↻ נגן שוב</button>
        <button onclick="fs('if${i}')">⤢ מסך מלא</button>
        <a class="dl" href="${c.mp4}" download="חרדים-לצבא-סגיר-${c.n}.mp4">⬇ הורד MP4</a>
      </div>`;
    grid.appendChild(card);
  });

  function reloadOne(i){ const f=document.getElementById("if"+i); f.src=f.src; }
  function reloadAll(){ closers.forEach((_,i)=>reloadOne(i)); }
  function fs(id){ const f=document.getElementById(id); (f.requestFullscreen||f.webkitRequestFullscreen||(()=>{})).call(f); }
</script>
</body>
</html>
